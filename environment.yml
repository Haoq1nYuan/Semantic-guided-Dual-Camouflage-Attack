name: sdca
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.8
  - pip
  - pytorch=2.4.1
  - torchvision=0.19.1
  - pytorch-cuda=11.8
  - numpy=1.23.5
  - scipy=1.10.1
  - scikit-image=0.21.0
  - matplotlib=3.7.5
  - pillow=10.4.0
  - pyyaml=6.0.2
  - tensorboard=2.14.0
  - pip:
      - opencv-python==4.10.0.84
      - phasepack==1.5
      - timm==1.0.11
      - pycocotools==2.0.7
      - ultralytics==8.3.37
